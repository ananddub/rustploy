version: '3.8'

services:
  rustploy-monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: rustploy_monitor
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - monitor_data:/app/data
    environment:
      - PORT=3001
      - MONITOR_DATABASE_URL=sqlite:///app/data/monitor.db
      - METRICS_TOKEN=change_me_to_your_secure_token
      - METRICS_URL_CALLBACK=http://your-rustploy-backend:3000/api/alerts
      - MONITOR_GRPC_BACKEND_URL=http://your-rustploy-backend:50051
      - CPU_THRESHOLD=85.0
      - MEMORY_THRESHOLD=90.0
      - REFRESH_RATE=10
      - RETENTION_DAYS=7

volumes:
  monitor_data:
