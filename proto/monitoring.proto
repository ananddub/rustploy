syntax = "proto3";

package monitoring;

// Dedicated Real-time gRPC Streaming Monitoring Service
service MonitoringService {
  // Bi-directional real-time hardware system metrics stream
  rpc StreamSystemMetrics (stream SystemMetricsRequest) returns (stream MetricsAck);

  // Bi-directional real-time Docker container metrics stream
  rpc StreamContainerMetrics (stream ContainerMetricsRequest) returns (stream MetricsAck);

  // Server-side real-time container log streaming
  rpc StreamLogs (LogStreamRequest) returns (stream LogChunk);

  // Bi-directional real-time health probe status stream
  rpc StreamHealth (stream HealthReportRequest) returns (stream HealthAck);

  // Query historical server metrics
  rpc GetServerMetrics (GetMetricsRequest) returns (ServerMetricsResponse);

  // Query historical container metrics
  rpc GetContainerMetrics (GetContainerMetricsRequest) returns (ContainerMetricsResponse);
}

message SystemMetricsRequest {
  int64 server_id = 1;
  double cpu_usage = 2;
  double memory_used_mb = 3;
  double memory_total_mb = 4;
  double memory_percent = 5;
  double disk_used_gb = 6;
  double disk_total_gb = 7;
  double disk_percent = 8;
  double net_rx_kbps = 9;
  double net_tx_kbps = 10;
  int64 timestamp = 11;
}

message ContainerMetricsRequest {
  int64 server_id = 1;
  int64 application_id = 2;
  int64 compose_id = 3;
  string container_id = 4;
  string container_name = 5;
  double cpu_percent = 6;
  double memory_used_mb = 7;
  double memory_limit_mb = 8;
  double net_rx_kbps = 9;
  double net_tx_kbps = 10;
  int64 timestamp = 11;
}

message MetricsAck {
  bool success = 1;
  int64 received_timestamp = 2;
  string message = 3;
}

message LogStreamRequest {
  int64 application_id = 1;
  int64 compose_id = 2;
  string container_id = 3;
  int32 tail_lines = 4;
}

message LogChunk {
  string container_id = 1;
  string log_line = 2;
  int64 timestamp = 3;
  bool is_stderr = 4;
}

message HealthReportRequest {
  int64 target_id = 1;
  string target_type = 2; // "APPLICATION", "DATABASE", "SERVER"
  string status = 3;      // "HEALTHY", "UNHEALTHY", "DEGRADED"
  int32 response_time_ms = 4;
  string error_message = 5;
  int64 timestamp = 6;
}

message HealthAck {
  bool acknowledged = 1;
  int64 timestamp = 2;
}

message ServerMetricPoint {
  int64 id = 1;
  string timestamp = 2;
  double cpu = 3;
  string cpu_model = 4;
  int32 cpu_cores = 5;
  int32 cpu_physical_cores = 6;
  double cpu_speed = 7;
  string os = 8;
  string distro = 9;
  string kernel = 10;
  string arch = 11;
  double mem_used = 12;
  double mem_used_gb = 13;
  double mem_total = 14;
  uint64 uptime = 15;
  double disk_used = 16;
  double total_disk = 17;
  double network_in = 18;
  double network_out = 19;
}

message ContainerMetricPoint {
  int64 id = 1;
  string timestamp = 2;
  string container_id = 3;
  string name = 4;
  double cpu_perc = 5;
  double mem_perc = 6;
  double mem_used_mb = 7;
  double mem_total_mb = 8;
  double net_in_mb = 9;
  double net_out_mb = 10;
  double block_read_mb = 11;
  double block_write_mb = 12;
}

message GetMetricsRequest {
  int64 server_id = 1;
  int32 limit = 2;
}

message ServerMetricsResponse {
  repeated ServerMetricPoint metrics = 1;
}

message GetContainerMetricsRequest {
  int64 server_id = 1;
  string app_name = 2;
  int32 limit = 3;
}

message ContainerMetricsResponse {
  repeated ContainerMetricPoint metrics = 1;
}
